<title>よていカレンダー</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --accent: #F07A5A;
  --accent-light: #FFE8E0;
  --mint: #5DCAA5;
  --mint-light: #E1F5EE;
  --amber: #EF9F27;
  --amber-light: #FFF3E0;
  --purple: #9B7FD4;
  --purple-light: #EFE8FF;
  --pink: #E97FA8;
  --pink-light: #FFE8F2;
  --bg: #FFF9F6;
  --card: #FFFFFF;
  --border: #F0E4DC;
  --text: #3A2E2A;
  --muted: #BBA8A2;
  --placeholder: #D4C4BE;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; }

.header { background: var(--accent); padding: 52px 20px 20px; color: #fff; }
.header h1 { font-size: 22px; font-weight: 600; }
.header p { font-size: 13px; opacity: 0.85; margin-top: 3px; }

.tabnav { display: flex; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
.tab { flex: 1; padding: 13px 0; text-align: center; font-size: 14px; color: var(--muted); border: none; background: none; border-bottom: 2.5px solid transparent; cursor: pointer; }
.tab.on { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

.screen { display: none; padding: 16px 16px 56px; }
.screen.on { display: block; }
.hint { font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.6; }

/* Pattern & child cards */
.pcard { background: var(--card); border-radius: 16px; padding: 14px 16px; margin-bottom: 10px; border: 1.5px solid var(--border); display: flex; align-items: center; gap: 12px; }
.pdot { width: 44px; height: 44px; border-radius: 13px; background: var(--accent-light); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
.pdot.b { background: var(--mint-light); color: #0F6E56; }
.pdot.c { background: var(--amber-light); color: #854F0B; }
.pinfo { flex: 1; }
.plabel { font-size: 11px; color: var(--muted); }
.ptime { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; margin-top: 1px; }
.cname { font-size: 16px; font-weight: 600; color: var(--text); }
.edit-btn { width: 30px; height: 30px; border-radius: 8px; background: var(--bg); border: 1px solid var(--border); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; }

.sec-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .5px; margin: 20px 0 10px; }
.sec-label:first-child { margin-top: 4px; }

.add-btn { width: 100%; padding: 14px; background: none; border: 1.5px dashed #E0D0CA; border-radius: 16px; color: var(--muted); font-size: 14px; cursor: pointer; margin-top: 4px; }

/* Week screen */
.week-card { background: var(--card); border-radius: 16px; border: 1.5px solid var(--border); padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.warrow { width: 42px; height: 42px; border-radius: 12px; background: var(--bg); border: 1.5px solid var(--border); font-size: 24px; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.warrow:active { background: var(--border); }
.wcenter { text-align: center; flex: 1; }
.wdate { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; display: block; }
.wrel { font-size: 12px; font-weight: 600; color: var(--accent); display: block; margin-top: 2px; }
.wrel.gray { color: var(--muted); font-weight: 400; }

.prev-btn { width: 100%; font-size: 13px; color: var(--muted); background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 9px 12px; cursor: pointer; margin-bottom: 12px; }
.prev-btn.ok { color: var(--mint); border-color: var(--mint); }

.dayrow { background: var(--card); border-radius: 16px; padding: 13px 15px; margin-bottom: 9px; border: 1.5px solid var(--border); }
.dayrow.weekend { background: #F5F8FF; border-color: #D8E4F8; }
.dlabel { font-size: 11px; color: var(--muted); margin-bottom: 10px; font-weight: 600; }
.child-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.child-row:last-of-type { margin-bottom: 0; }
.crow-name { font-size: 12px; font-weight: 600; color: var(--muted); }
.chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip { padding: 7px 12px; border-radius: 20px; font-size: 13px; border: 1.5px solid var(--border); background: var(--bg); color: var(--muted); cursor: pointer; white-space: nowrap; user-select: none; -webkit-user-select: none; }
.chip.ona { background: var(--accent-light); border-color: var(--accent); color: #B05040; font-weight: 600; }
.chip.onb { background: var(--mint-light); border-color: var(--mint); color: #0F6E56; font-weight: 600; }
.chip.onc { background: var(--amber-light); border-color: var(--amber); color: #854F0B; font-weight: 600; }
.chip.ond { background: var(--purple-light); border-color: var(--purple); color: #6040A0; font-weight: 600; }
.chip.one { background: var(--pink-light); border-color: var(--pink); color: #A04060; font-weight: 600; }

.memo { width: 100%; border: none; background: transparent; font-size: 13px; color: #8A7A74; outline: none; padding: 9px 0 1px; margin-top: 8px; border-top: 1px dashed var(--border); font-family: inherit; }
.memo::placeholder { color: var(--placeholder); }

.reset-btn { width:100%; font-size:12px; color:var(--muted); background:none; border:none; padding:4px; cursor:pointer; margin-bottom:10px; }
.sendbtn { width: 100%; padding: 17px; background: var(--accent); color: #FFFFFF; border: none; border-radius: 18px; font-size: 16px; font-weight: 700; cursor: pointer; display: block; margin-top: 4px; }
.sendbtn:active { opacity: 0.88; }
.sendbtn.ok { background: var(--mint); }
.sendhint { font-size: 11px; color: var(--muted); text-align: center; margin-top: 9px; }

/* Modal */
.overlay { display: none; position: fixed; inset: 0; background: rgba(58,46,42,0.4); z-index: 100; align-items: flex-end; justify-content: center; }
.overlay.on { display: flex; }
.modal { background: var(--card); width: 100%; max-width: 480px; border-radius: 24px 24px 0 0; padding: 24px 20px 44px; }
.modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 20px; }
.modal label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }
.modal input[type=text], .modal input[type=time] { width: 100%; padding: 13px 15px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--bg); font-size: 17px; color: var(--text); outline: none; font-family: inherit; margin-bottom: 16px; }
.modal input:focus { border-color: var(--accent); }
.copt-row { display: flex; gap: 10px; margin-bottom: 20px; }
.copt { flex: 1; padding: 10px; border-radius: 12px; border: 2px solid transparent; text-align: center; font-size: 14px; font-weight: 600; cursor: pointer; }
.copt.a { background: var(--accent-light); color: var(--accent); }
.copt.b { background: var(--mint-light); color: #0F6E56; }
.copt.c { background: var(--amber-light); color: #854F0B; }
.copt.sel { border-color: currentColor; }
.mbtns { display: flex; gap: 10px; }
.mcancel { flex: 1; padding: 14px; border-radius: 14px; background: var(--bg); border: 1.5px solid var(--border); font-size: 15px; color: var(--muted); cursor: pointer; }
.msave { flex: 2; padding: 14px; border-radius: 14px; background: var(--accent); border: none; font-size: 15px; color: #fff; font-weight: 700; cursor: pointer; }
.mdel { width: 100%; padding: 13px; border-radius: 14px; background: none; border: 1.5px solid #F0D0D0; color: #C06060; font-size: 14px; cursor: pointer; margin-top: 10px; }

</style>
</head>
<body>

<div class="header">
  <h1>よていカレンダー</h1>
</div>

<div class="tabnav">
  <button class="tab on" id="tab0" onclick="switchTab('s0',0)">設定</button>
  <button class="tab" id="tab1" onclick="switchTab('s1',1)">入力</button>
</div>

<!-- Settings -->
<div id="s0" class="screen on">
  <div class="sec-label">こども</div>
  <div id="child-list"></div>
  <button class="add-btn" onclick="openChildAdd()">＋ 子供を追加</button>
  <div class="sec-label">げこうパターン</div>
  <div id="plist"></div>
  <button class="add-btn" onclick="openPatAdd()">＋ パターンを追加</button>
  <button class="reset-btn" style="margin-top:16px;color:#C06060;" onclick="resetSettings()">子供の設定をリセット（デフォルトに戻す）</button>
</div>

<!-- Week -->
<div id="s1" class="screen">
  <div class="week-card">
    <button class="warrow" onclick="changeWeek(-1)">&#8249;</button>
    <div class="wcenter">
      <span class="wdate" id="wdate">-</span>
      <span class="wrel" id="wrel">今週</span>
    </div>
    <button class="warrow" onclick="changeWeek(1)">&#8250;</button>
  </div>
  <div id="drows"></div>
  <button class="sendbtn" id="sendbtn" onclick="sendCal()">カレンダーへ送る</button>
  <button class="reset-btn" id="reset-week-btn" style="color:#C06060;margin-top:12px;" onclick="resetWeek()">この週をリセット</button>
</div>

<!-- Child modal -->
<div class="overlay" id="child-ov">
  <div class="modal">
    <h3 id="child-mtitle">子供を追加</h3>
    <label>名前</label>
    <input type="text" id="child-name" placeholder="こどもの名前">
    <label>アイコン</label>
    <div id="emoji-row" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;"></div>
    <div class="mbtns">
      <button class="mcancel" onclick="closeModal('child-ov')">キャンセル</button>
      <button class="msave" onclick="saveChild()">保存する</button>
    </div>
    <button class="mdel" id="child-del" onclick="deleteChild()">削除する</button>
  </div>
</div>

<!-- Pattern modal -->
<div class="overlay" id="pat-ov">
  <div class="modal">
    <h3 id="pat-mtitle">パターンを追加</h3>
    <label>ラベル</label>
    <input type="text" id="pat-label" placeholder="例：普通授業、短縮">
    <label>下校時間</label>
    <input type="time" id="pat-time" value="14:30">
    <label>色</label>
    <div class="copt-row" id="copt-row" style="flex-wrap:wrap;">
      <div class="copt a" onclick="selPatCol('a',this)">A</div>
      <div class="copt b" onclick="selPatCol('b',this)">B</div>
      <div class="copt c" onclick="selPatCol('c',this)">C</div>
      <div class="copt d" onclick="selPatCol('d',this)">D</div>
      <div class="copt e" onclick="selPatCol('e',this)">E</div>
    </div>
    <label>カレンダー備考（任意）</label>
    <input type="text" id="pat-note" placeholder="例：給食なし、弁当持参">
    <div class="mbtns">
      <button class="mcancel" onclick="closeModal('pat-ov')">キャンセル</button>
      <button class="msave" onclick="savePat()">保存する</button>
    </div>
    <button class="mdel" id="pat-del" onclick="deletePat()">削除する</button>
  </div>
</div>

<script>
var DAYS_LABEL = ['月曜日','火曜日','水曜日','木曜日','金曜日','土曜日','日曜日'];
var DKEYS = ['mon','tue','wed','thu','fri','sat','sun'];
var PAT_IDS = 'ABCDEFGH';

function lsGet(k){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){return null;} }
function lsSet(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
function persist(){ lsSet('v2_children',children); lsSet('v2_pats',pats); lsSet('v2_store',store); }
function uid(){ return 'c'+Date.now()+Math.floor(Math.random()*1000); }

var DEFAULT_CHILDREN = [{id:'c1',name:'こどもの名前',emoji:'👦'}];
var children = lsGet('v2_children') || DEFAULT_CHILDREN;
var DEFAULT_PATS = [
  {id:'A',label:'普通授業',time:'14:30',pcol:'a',note:''},
  {id:'B',label:'短縮授業',time:'13:00',pcol:'b',note:''},
  {id:'C',label:'早帰り',  time:'12:15',pcol:'c',note:''},
  {id:'D',label:'給食なし',time:'12:00',pcol:'d',note:'弁当持参'},
  {id:'E',label:'その他',  time:'14:00',pcol:'e',note:''}
];
var pats = lsGet('v2_pats') || DEFAULT_PATS;
var store = lsGet('v2_store') || {};
var offset = 0;
var editChildIdx = null, editPatIdx = null;
var curEmoji = '👦', curPatCol = 'a';

function key(){ return 'w'+offset; }
function wd(){
  if(!store[key()]) store[key()]={sel:{},memo:{mon:'',tue:'',wed:'',thu:'',fri:'',sat:'',sun:''}};
  // ensure sel has entry per child
  children.forEach(function(c){ if(!store[key()].sel[c.id]) store[key()].sel[c.id]={}; });
  return store[key()];
}

function getMon(off){
  var now=new Date(), day=now.getDay()||7;
  var mon=new Date(now);
  mon.setDate(now.getDate()-day+1+off*7);
  mon.setHours(0,0,0,0);
  return mon;
}
function fmt(d){ return (d.getMonth()+1)+'/'+d.getDate(); }

function switchTab(id,idx){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.getElementById(id).classList.add('on');
  document.getElementById('tab'+idx).classList.add('on');
  if(id==='s0') renderSettings();
  if(id==='s1') renderWeek();
}

function changeWeek(dir){ offset+=dir; renderWeek(); }

// ---- SETTINGS ----
function renderSettings(){
  var cl=document.getElementById('child-list');
  cl.innerHTML='';
  children.forEach(function(c,i){
    var card=document.createElement('div');
    card.className='pcard';
    card.innerHTML='<div class="pdot" style="font-size:22px;background:#FFF3E8">'+c.emoji+'</div>'+
      '<div class="pinfo"><div class="cname">'+c.name+'</div></div>';
    var btn=document.createElement('button');
    btn.className='edit-btn';
    btn.textContent='…';
    btn.addEventListener('click',function(){ openChildEdit(i); });
    card.appendChild(btn);
    cl.appendChild(card);
  });

  var pl=document.getElementById('plist');
  pl.innerHTML='';
  pats.forEach(function(p,i){
    var card=document.createElement('div');
    card.className='pcard';
    card.innerHTML='<div class="pdot '+(p.pcol==='a'?'':p.pcol)+'">'+p.id+'</div>'+
      '<div class="pinfo"><div class="plabel">'+p.label+(p.note?' · '+p.note:'')+'</div><div class="ptime">'+p.time+'</div></div>';
    var btn=document.createElement('button');
    btn.className='edit-btn';
    btn.textContent='…';
    btn.addEventListener('click',function(){ openPatEdit(i); });
    card.appendChild(btn);
    pl.appendChild(card);
  });
}

// ---- WEEK ----
function renderWeek(){
  var mon=getMon(offset), fri=new Date(mon);
  fri.setDate(mon.getDate()+4);
  document.getElementById('wdate').textContent=fmt(mon)+' 〜 '+fmt(fri);
  var relEl=document.getElementById('wrel');
  var rel=offset===0?'今週':offset===1?'来週':offset===-1?'先週':offset>0?offset+'週間後':Math.abs(offset)+'週間前';
  relEl.textContent=rel;
  relEl.className='wrel'+(offset===0?'':' gray');
  var rb=document.getElementById('reset-week-btn');
  if(rb) rb.textContent=fmt(mon)+' 〜 '+fmt(fri)+' をリセット';

  var d=wd();
  var cont=document.getElementById('drows');
  cont.innerHTML='';

  DKEYS.forEach(function(dkey,di){
    var row=document.createElement('div');
    row.className='dayrow'+(di>=5?' weekend':'');

    var dlabel=document.createElement('div');
    dlabel.className='dlabel';
    var dayDate=new Date(mon); dayDate.setDate(mon.getDate()+di);
    dlabel.textContent=DAYS_LABEL[di]+'　'+(dayDate.getMonth()+1)+'/'+dayDate.getDate();
    row.appendChild(dlabel);

    children.forEach(function(c){
      var crow=document.createElement('div');
      crow.className='child-row';

      var nameDiv=document.createElement('div');
      nameDiv.className='crow-name';
      nameDiv.textContent=c.emoji+' '+c.name;
      crow.appendChild(nameDiv);

      var chipsDiv=document.createElement('div');
      chipsDiv.className='chips';

      pats.forEach(function(p){
        var chip=document.createElement('div');
        chip.className='chip';
        var curSel=d.sel[c.id]?d.sel[c.id][dkey]:null;
        if(curSel===p.id) chip.classList.add('on'+p.pcol);
        chip.textContent=p.id+'\u3000'+p.time;

        // Use touchend for iOS, click for desktop
        function doSelect(){
          var d2=wd();
          if(!d2.sel[c.id]) d2.sel[c.id]={};
          // すでに選択済みならキャンセル
          if(d2.sel[c.id][dkey]===p.id){
            d2.sel[c.id][dkey]=null;
            persist();
            chip.classList.remove('on'+p.pcol);
          } else {
            d2.sel[c.id][dkey]=p.id;
            persist();
            chipsDiv.querySelectorAll('.chip').forEach(function(x){
              x.classList.remove('ona','onb','onc','ond','one');
            });
            chip.classList.add('on'+p.pcol);
          }
        }

        chip.addEventListener('touchend', function(e){
          e.preventDefault();
          doSelect();
        });
        chip.addEventListener('click', function(e){
          doSelect();
        });

        chipsDiv.appendChild(chip);
      });

      crow.appendChild(chipsDiv);
      row.appendChild(crow);
    });

    // memo
    var memoEl=document.createElement('input');
    memoEl.className='memo';
    memoEl.type='text';
    memoEl.placeholder='メモ（任意）';
    memoEl.value=d.memo[dkey]||'';
    memoEl.addEventListener('input',function(){
      wd().memo[dkey]=memoEl.value;
      persist();
    });
    row.appendChild(memoEl);
    cont.appendChild(row);
  });
}

function buildIcs(){
  var d=wd(), mon=getMon(offset);
  var ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//下校タイマー//JP\r\nCALSCALE:GREGORIAN\r\n';
  var cnt=0;
  DKEYS.forEach(function(dkey,di){
    var memo=d.memo[dkey]||'';
    var byTime={};
    children.forEach(function(c){
      var pid=d.sel[c.id]?d.sel[c.id][dkey]:null; if(!pid) return;
      var p=pats.find(function(x){return x.id===pid;}); if(!p) return;
      if(!byTime[p.time]) byTime[p.time]=[];
      byTime[p.time].push({c:c,p:p});
    });
    Object.keys(byTime).forEach(function(timeStr){
      var entries=byTime[timeStr];
      var date=new Date(mon); date.setDate(mon.getDate()+di);
      var parts=timeStr.split(':');
      var st=new Date(date); st.setHours(+parts[0],+parts[1],0);
      var en=new Date(st); en.setMinutes(en.getMinutes()+30);
      var f=function(dt){ return dt.getFullYear()+('0'+(dt.getMonth()+1)).slice(-2)+('0'+dt.getDate()).slice(-2)+'T'+('0'+dt.getHours()).slice(-2)+('0'+dt.getMinutes()).slice(-2)+'00'; };
      var names=entries.map(function(e){return e.c.name;}).join('・');
      var label=entries[0].p.label;
      var patNote=entries[0].p.note||'';
      var desc=names+' '+label+(patNote?'\\n'+patNote:'')+(memo?'\\n'+memo:'');
      ics+='BEGIN:VEVENT\r\nSUMMARY:下校 '+timeStr+'（'+names+'）\r\nDTSTART:'+f(st)+'\r\nDTEND:'+f(en)+'\r\nDESCRIPTION:'+desc+'\r\nBEGIN:VALARM\r\nTRIGGER:-PT30M\r\nACTION:DISPLAY\r\nDESCRIPTION:'+names+'の下校時間です\r\nEND:VALARM\r\nEND:VEVENT\r\n';
      cnt++;
    });
  });
  ics+='END:VCALENDAR';
  return {ics:ics,cnt:cnt};
}

function resetSettings(){
  openModal('reset-settings-ov');
}
function doResetSettings(){
  children = DEFAULT_CHILDREN.map(function(c){return Object.assign({},c);});
  pats = DEFAULT_PATS.map(function(p){return Object.assign({},p);});
  persist(); closeModal('reset-settings-ov'); renderSettings();
}
function resetWeek(){
  openModal('reset-ov');
}
function doReset(){
  closeModal('reset-ov');
  store[key()]={sel:{},memo:{mon:'',tue:'',wed:'',thu:'',fri:'',sat:'',sun:''}};
  persist(); renderWeek();
}
function sendCal(){
  var result=buildIcs();
  var btn=document.getElementById('sendbtn');
  if(result.cnt===0){
    btn.textContent='入力してください';
    setTimeout(function(){btn.textContent='カレンダーへ送る';},2000);
    return;
  }
  window.location.href='data:text/calendar;charset=utf-8,'+encodeURIComponent(result.ics);
  btn.textContent=result.cnt+'件 送信しました！'; btn.classList.add('ok');
  setTimeout(function(){btn.textContent='カレンダーへ送る';btn.classList.remove('ok');},3000);
}

// ---- CHILD MODAL ----
var EMOJIS=['👦','👧','🧒','👶','🐻','🐰','🐱','🐶','⭐','🌸','🦊','🐼','🎀','🚀','🍀','🎵'];
function buildEmojiRow(selected){
  curEmoji=selected||'👦';
  var row=document.getElementById('emoji-row');
  row.innerHTML='';
  EMOJIS.forEach(function(em){
    var el=document.createElement('div');
    el.style.cssText='width:40px;height:40px;border-radius:10px;border:2px solid '+(em===curEmoji?'var(--accent)':'transparent')+';background:'+(em===curEmoji?'var(--accent-light)':'var(--bg)')+';display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;';
    el.textContent=em;
    el.addEventListener('click',function(){
      curEmoji=em;
      row.querySelectorAll('div').forEach(function(o){
        o.style.borderColor='transparent';
        o.style.background='var(--bg)';
      });
      el.style.borderColor='var(--accent)';
      el.style.background='var(--accent-light)';
    });
    row.appendChild(el);
  });
}

function openChildAdd(){
  editChildIdx=null; curEmoji='👦';
  document.getElementById('child-mtitle').textContent='子供を追加';
  document.getElementById('child-name').value='';
  document.getElementById('child-del').style.display='none';
  buildEmojiRow('👦');
  openModal('child-ov');
}
function openChildEdit(idx){
  editChildIdx=idx; var c=children[idx];
  curEmoji=c.emoji;
  document.getElementById('child-mtitle').textContent='子供を編集';
  document.getElementById('child-name').value=c.name;
  document.getElementById('child-del').style.display='block';
  buildEmojiRow(c.emoji);
  openModal('child-ov');
}
function saveChild(){
  var name=document.getElementById('child-name').value.trim()||'子供';
  if(editChildIdx!==null){
    children[editChildIdx]={id:children[editChildIdx].id,name:name,emoji:curEmoji};
  } else {
    children.push({id:uid(),name:name,emoji:curEmoji});
  }
  persist(); closeModal('child-ov'); renderSettings();
}
function deleteChild(){
  if(children.length<=1){alert('最低1人は必要です');return;}
  children.splice(editChildIdx,1);
  persist(); closeModal('child-ov'); renderSettings();
}

// ---- PATTERN MODAL ----
function selPatCol(c,el){
  curPatCol=c;
  document.querySelectorAll('.copt').forEach(function(o){o.classList.remove('sel');});
  el.classList.add('sel');
}
function openPatAdd(){
  editPatIdx=null; curPatCol='a';
  document.getElementById('pat-mtitle').textContent='パターンを追加';
  document.getElementById('pat-label').value='';
  document.getElementById('pat-time').value='14:30';
  document.getElementById('pat-del').style.display='none';
  document.getElementById('pat-note').value='';
  document.querySelectorAll('.copt').forEach(function(o){o.classList.toggle('sel',o.classList.contains('a'));});
  openModal('pat-ov');
}
function openPatEdit(idx){
  editPatIdx=idx; var p=pats[idx]; curPatCol=p.pcol;
  document.getElementById('pat-mtitle').textContent='パターンを編集';
  document.getElementById('pat-label').value=p.label;
  document.getElementById('pat-time').value=p.time;
  document.getElementById('pat-del').style.display='block';
  document.getElementById('pat-note').value=p.note||'';
  document.querySelectorAll('.copt').forEach(function(o){o.classList.toggle('sel',o.classList.contains(p.pcol));});
  openModal('pat-ov');
}
function savePat(){
  var label=document.getElementById('pat-label').value.trim()||'パターン';
  var time=document.getElementById('pat-time').value||'14:30';
  var note=document.getElementById('pat-note').value.trim();
  if(editPatIdx!==null){
    pats[editPatIdx]={id:pats[editPatIdx].id,label:label,time:time,pcol:curPatCol,note:note};
  } else {
    pats.push({id:PAT_IDS[pats.length]||'Z',label:label,time:time,pcol:curPatCol,note:note});
  }
  persist(); closeModal('pat-ov'); renderSettings();
}
function deletePat(){
  pats.splice(editPatIdx,1);
  persist(); closeModal('pat-ov'); renderSettings();
}

function openModal(id){
  document.getElementById(id).classList.add('on');
  document.getElementById(id).addEventListener('click',function ovClick(e){
    if(e.target===document.getElementById(id)){ closeModal(id); document.getElementById(id).removeEventListener('click',ovClick); }
  });
}
function closeModal(id){ document.getElementById(id).classList.remove('on'); }

// Init
renderSettings();
</script>
